name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: |
          swift build -c release --disable-sandbox
          BIN=$(swift build -c release --disable-sandbox --show-bin-path)

          rm -rf wtop.app
          mkdir -p wtop.app/Contents/{MacOS,Helpers,Resources}
          cp "$BIN/wtop" wtop.app/Contents/MacOS/
          cp "$BIN/wtop-helper" wtop.app/Contents/Helpers/
          cp Info.plist wtop.app/Contents/
          cp support/me.abizer.wtop.helper.plist wtop.app/Contents/Resources/
          cp support/install-helper.sh wtop.app/Contents/Resources/
          chmod +x wtop.app/Contents/Resources/install-helper.sh
          codesign --force --sign - wtop.app/Contents/Helpers/wtop-helper
          codesign --force --sign - wtop.app

      - name: Create zip
        run: ditto -c -k --keepParent wtop.app wtop.app.zip

      - name: Compute sha256
        id: sha
        run: echo "sha256=$(shasum -a 256 wtop.app.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" wtop.app.zip \
            --title "v${VERSION}" \
            --generate-notes

      # download-url contains a literal Ruby interpolation (#{version}) so the
      # cask's url stanza retains it — otherwise brew audit flags the URL as
      # unversioned. Ruby evaluates #{version} at cask load time.
      - name: Bump homebrew cask
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: wtop
          formula-path: Casks/wtop.rb
          homebrew-tap: abizer/homebrew-tap
          base-branch: master
          download-url: 'https://github.com/abizer/wtop/releases/download/v#{version}/wtop.app.zip'
          download-sha256: ${{ steps.sha.outputs.sha256 }}
          commit-message: "wtop {{version}}"
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_TOKEN }}
