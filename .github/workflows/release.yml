name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: |
          swift build -c release --disable-sandbox
          BIN=$(swift build -c release --disable-sandbox --show-bin-path)

          rm -rf wtop.app
          mkdir -p wtop.app/Contents/{MacOS,Helpers,Resources}
          cp "$BIN/wtop" wtop.app/Contents/MacOS/
          cp "$BIN/wtop-helper" wtop.app/Contents/Helpers/
          cp Info.plist wtop.app/Contents/
          cp support/me.abizer.wtop.helper.plist wtop.app/Contents/Resources/
          cp support/install-helper.sh wtop.app/Contents/Resources/
          chmod +x wtop.app/Contents/Resources/install-helper.sh
          codesign --force --sign - wtop.app/Contents/Helpers/wtop-helper
          codesign --force --sign - wtop.app

      - name: Create zip
        run: ditto -c -k --keepParent wtop.app wtop.app.zip

      - name: Compute sha256
        id: sha
        run: echo "sha256=$(shasum -a 256 wtop.app.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" wtop.app.zip \
            --title "v${VERSION}" \
            --generate-notes

      # brew bump-cask-pr is Homebrew's canonical cask bumper — preserves
      # #{version} interpolation in the url stanza (unlike mislav's JS action,
      # which parses the cask as plain text). --write-only --commit makes it
      # commit locally without opening a PR; we push the commit ourselves.
      - uses: Homebrew/actions/setup-homebrew@main
      - name: Bump homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          HOMEBREW_NO_INSTALL_FROM_API: "1"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          brew tap abizer/homebrew-tap
          tap_repo="$(brew --repository abizer/homebrew-tap)"
          cd "$tap_repo"
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/abizer/homebrew-tap.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          brew bump-cask-pr \
            --write-only --commit \
            --no-audit --no-style \
            --version="${VERSION}" \
            --sha256="${SHA}" \
            abizer/tap/wtop

          git push origin HEAD:master
