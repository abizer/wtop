name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: |
          swift build -c release --disable-sandbox
          BIN=$(swift build -c release --disable-sandbox --show-bin-path)

          rm -rf wtop.app
          mkdir -p wtop.app/Contents/{MacOS,Helpers,Resources}
          cp "$BIN/wtop" wtop.app/Contents/MacOS/
          cp "$BIN/wtop-helper" wtop.app/Contents/Helpers/
          cp Info.plist wtop.app/Contents/
          cp support/me.abizer.wtop.helper.plist wtop.app/Contents/Resources/
          cp support/install-helper.sh wtop.app/Contents/Resources/
          chmod +x wtop.app/Contents/Resources/install-helper.sh
          codesign --force --sign - wtop.app/Contents/Helpers/wtop-helper
          codesign --force --sign - wtop.app

      - name: Create zip
        run: ditto -c -k --keepParent wtop.app wtop.app.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" wtop.app.zip \
            --title "v${VERSION}" \
            --generate-notes

      # Mislav's action rewrites the url stanza to a literal version, which
      # trips brew audit's "URL is unversioned" rule. Hand-rolled sed preserves
      # the v#{version} interpolation in the cask.
      - name: Bump homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA=$(shasum -a 256 wtop.app.zip | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/abizer/homebrew-tap.git" tap
          cd tap

          sed -i '' "s|version \"[0-9]*\.[0-9]*\.[0-9]*\"|version \"${VERSION}\"|" Casks/wtop.rb
          sed -i '' "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA}\"|" Casks/wtop.rb

          if git diff --quiet Casks/wtop.rb; then
            echo "cask already up to date for v${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/wtop.rb
          git commit -m "wtop ${VERSION}"
          git push
